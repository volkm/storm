# Prepares a deb package of Storm
name: Build deb package

on:
  # needed to reuse the workflow from another one
  workflow_call:
    inputs:
      version:
        description: 'Version to use for Storm (e.g. 1.1.0)'
        required: true
        type: string
        default: 'x.y.z'
  # needed to trigger the workflow manually
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to use for Storm (e.g. 1.1.0)'
        required: true
        type: string
        default: 'x.y.z'

env:
  # GitHub runners currently have 4 cores
  NR_JOBS: "4"

jobs:
  build_deb:
    name: Build Debian package on ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: amd64, runner: "ubuntu-latest" }
          - { name: arm64, runner: "ubuntu-24.04-arm" }

    steps:
      - name: Git clone
        uses: actions/checkout@v6
        with:
          repository: stormchecker/storm
      - name: Build Storm from Dockerfile
        run: |
          docker build -t movesrwth/storm:ci . \
            --build-arg BASE_IMAGE=movesrwth/storm-basesystem:debian-12 \
            --build-arg build_type="Release" \
            --build-arg carl_tag=master \
            --build-arg cmake_args="-DSTORM_BUILD_TESTS=OFF -DCPACK_DEBIAN_PACKAGE_VERSION=${{ inputs.version }}" \
            --build-arg no_threads=${NR_JOBS}
            # Sets the debian version for CPack. CMake version remains unchanged because it must be numeric.
            # Omitting arguments developer, disable_*, cln_exact, cln_ratfunc, all_sanitizers
      - name: Run Docker container
        run: docker run -d -it --name ci movesrwth/storm:ci

      - name: Create .deb package
        run: docker exec ci bash -c "cd /opt/storm/build && make package"

      - name: Copy package from container
        run: |
          docker exec ci bash -c "mkdir -p /opt/package && cp /opt/storm/build/*.deb /opt/package/"
          docker cp ci:/opt/package ./package

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v7
        with:
          name: storm-deb-${{ matrix.platform.name }}
          path: ./package/*.deb


test_deb:
    name: Test Debian package on ${{ matrix.distro.name }}-${{ matrix.platform.name }}
    needs: build_deb
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        distro:
          - { name: "debian:12" }
          - { name: "debian:13" }
          - { name: "ubuntu:24.04" }
          - { name: "ubuntu:rolling" }
        platform:
          - { name: amd64, runner: "ubuntu-latest" }
          - { name: arm64, runner: "ubuntu-24.04-arm" }

    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: storm-deb-${{ matrix.platform.name }}
          path: package

      - name: Install and test package
        run: |
          docker run -d -it --name ci-test ${{ matrix.distro.name }}
          docker cp package/*.deb ci-test:/opt/
          docker exec ci-test bash -c "
            set -e
            apt-get update
            apt-get install -y /opt/*.deb
            storm --version
          "
      - name: Build starter project using Storm
        run: |
          docker exec ci-test bash -c "
            apt-get install -y build-essential ca-certificates cmake git
            git clone https://github.com/stormchecker/storm-project-starter-cpp /opt/storm-starter
            mkdir -p /opt/storm-starter/build
            cd /opt/storm-starter/build
            cmake -DNEVER_FETCH_STORM=TRUE ..
            make -j ${NR_JOBS}
            ./bin/starter-project ../examples/die.pm ../examples/die.pctl
          "
